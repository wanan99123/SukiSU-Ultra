name: Release
permissions:
  contents: write
  actions: write
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-manager:
    uses: ./.github/workflows/build-manager.yml
    secrets: inherit

  release:
    needs:
      - build-manager
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Rename ksud
        run: |
          mkdir -p ksud
          for dir in ./ksud-*; do
              if [ -d "$dir" ]; then
                 echo "----- Rename $dir -----"
                 ksud_platform_name=$(basename "$dir")
                 find "$dir" -type f -name "ksud" -path "*/release/*" | while read -r ksud_file; do
                   if [ -f "$ksud_file" ]; then
                     mv "$ksud_file" "ksud/$ksud_platform_name"
                   fi
                 done
              fi
          done

      - name: Rename LKM artifacts
        run: |
          echo "===== Renaming LKM artifacts ====="
          for dir in android*-lkm; do
            if [ -d "$dir" ]; then
              echo "Processing $dir..."
              find "$dir" -name "*.ko" | while read -r ko_file; do
                kmi_version=$(basename "$dir" | sed 's/-lkm$//')
                filename=$(basename "$ko_file")
                if [[ "$filename" != "${kmi_version}_"* ]]; then
                  new_name="${kmi_version}_${filename}"
                  echo "Renaming: $ko_file -> $(dirname "$ko_file")/$new_name"
                  mv "$ko_file" "$(dirname "$ko_file")/$new_name"
                fi
              done
            fi
          done

      - name: Zip AnyKernel3
        run: |
          for dir in AnyKernel3-*; do
            if [ -d "$dir" ]; then
              echo "----- Zip $dir -----"
              (cd "$dir" && zip -r9 "$dir".zip ./* -x .git .gitignore ./*.zip && mv *.zip ..) 2>/dev/null || true
            fi
          done

      - name: Zip WSA kernel
        run: |
          for dir in kernel-WSA-*; do
            if [ -d "$dir" ]; then
              echo "------ Zip $dir ----------"
              (cd "$dir" && zip -r9 "$dir".zip ./* -x .git .gitignore ./*.zip && mv *.zip ..) 2>/dev/null || true
            fi
          done

      - name: Zip ChromeOS ARCVM kernel
        run: |
          for dir in kernel-ARCVM-*; do
            if [ -d "$dir" ]; then
              echo "------ Zip $dir ----------"
              (cd "$dir" && zip -r9 "$dir".zip ./* -x .git .gitignore ./*.zip && mv *.zip ..) 2>/dev/null || true
            fi
          done

      - name: Display structure of downloaded files
        run: ls -R

      - name: 检查权限和文件
        id: check
        run: |
          echo "=========================================="
          echo "检查 GitHub Token 权限"
          echo "=========================================="
          
          # 检查 token 是否存在
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "✅ GITHUB_TOKEN 已配置"
            TOKEN_LENGTH=$(echo -n "${{ secrets.GITHUB_TOKEN }}" | wc -c)
            echo "   Token 长度: $TOKEN_LENGTH"
          else
            echo "❌ GITHUB_TOKEN 未配置!"
            exit 1
          fi
          
          # 检查仓库权限
          echo ""
          echo "检查仓库权限..."
          REPO_PERMS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }} | \
            grep -E '"permissions":|"push":|"pull":' | head -5)
          echo "$REPO_PERMS"
          
          # 检查当前用户
          echo ""
          echo "当前认证用户:"
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/user | grep -E '"login"|"name"' || echo "无法获取用户信息"
          
          echo ""
          echo "=========================================="
          echo "检查发布文件"
          echo "=========================================="
          
          # 收集文件列表
          echo "查找所有可发布文件:"
          find . -maxdepth 3 -type f \( -name "*.apk" -o -name "*.ko" -o -name "*.zip" \) 2>/dev/null | head -20 || echo "没有找到文件"
          
          # 统计文件
          APK_COUNT=$(find . -name "*.apk" 2>/dev/null | wc -l)
          KO_COUNT=$(find . -name "*.ko" 2>/dev/null | wc -l)
          ZIP_COUNT=$(find . -name "*.zip" 2>/dev/null | wc -l)
          
          echo ""
          echo "文件统计:"
          echo "  APK: $APK_COUNT"
          echo "  KO: $KO_COUNT"
          echo "  ZIP: $ZIP_COUNT"
          
          if [ $APK_COUNT -eq 0 ] && [ $KO_COUNT -eq 0 ] && [ $ZIP_COUNT -eq 0 ]; then
            echo ""
            echo "⚠️ 警告: 没有找到任何可发布文件!"
            echo "当前目录内容:"
            ls -la
          fi
          
          # 保存统计信息
          echo "APK_COUNT=$APK_COUNT" >> $GITHUB_OUTPUT
          echo "KO_COUNT=$KO_COUNT" >> $GITHUB_OUTPUT
          echo "ZIP_COUNT=$ZIP_COUNT" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=========================================="
          echo "检查 Release 是否存在"
          echo "=========================================="
          
          # 检查是否已经有 Release
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "$RELEASE_URL")
          
          echo "Release 查询状态码: $RELEASE_EXISTS"
          
          if [ "$RELEASE_EXISTS" = "200" ]; then
            echo "✅ Release 已存在，将更新附件"
            echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
          elif [ "$RELEASE_EXISTS" = "404" ]; then
            echo "✅ Release 不存在，将创建新 Release"
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 未知状态: $RELEASE_EXISTS"
            echo "RELEASE_EXISTS=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            manager/*.apk
            android*-lkm/*.ko
            AnyKernel3-*.zip
            boot-images-*/Image-*/*.img.gz
            kernel-WSA*.zip
            kernel-ARCVM*.zip
            ksud/ksud-*
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: 验证上传结果
        if: always()
        run: |
          echo "=========================================="
          echo "验证 Release 上传结果"
          echo "=========================================="
          
          # 检查 Release 是否创建成功
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$RELEASE_URL")
          
          if echo "$RELEASE_INFO" | grep -q '"id":'; then
            RELEASE_ID=$(echo "$RELEASE_INFO" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
            echo "✅ Release 已创建: ID $RELEASE_ID"
            echo "   URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
            
            # 获取附件列表
            echo ""
            echo "已上传的附件:"
            echo "$RELEASE_INFO" | grep -o '"name":"[^"]*"' | sed 's/"name":"/- /' | sed 's/"$//' || echo "  没有附件"
          else
            echo "❌ Release 创建失败"
            echo ""
            echo "API 响应:"
            echo "$RELEASE_INFO" | head -20
            
            # 如果是 403 错误，说明权限不足
            if echo "$RELEASE_INFO" | grep -q "403"; then
              echo ""
              echo "⚠️ 权限不足! 请检查:"
              echo "1. GITHUB_TOKEN 是否有 repo 权限"
              echo "2. 仓库设置中的 Actions 权限"
              echo "3. 是否在 fork 仓库中运行"
            fi
          fi