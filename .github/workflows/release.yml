name: Release
permissions:
  contents: write
  actions: write
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_title:
        description: 'Release title'
        required: false
        default: ''

jobs:
  build-manager:
    uses: ./.github/workflows/build-manager.yml
    secrets: inherit

  release:
    needs:
      - build-manager
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 创建 Tag (手动触发时)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          echo "创建 Tag: $TAG_NAME"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Rename ksud
        run: |
          mkdir -p ksud
          for dir in ./ksud-*; do
              if [ -d "$dir" ]; then
                 echo "----- Rename $dir -----"
                 ksud_platform_name=$(basename "$dir")
                 find "$dir" -type f -name "ksud" -path "*/release/*" | while read -r ksud_file; do
                   if [ -f "$ksud_file" ]; then
                     mv "$ksud_file" "ksud/$ksud_platform_name"
                   fi
                 done
              fi
          done

      - name: Rename LKM artifacts
        run: |
          echo "===== Renaming LKM artifacts ====="
          for dir in android*-lkm; do
            if [ -d "$dir" ]; then
              echo "Processing $dir..."
              find "$dir" -name "*.ko" | while read -r ko_file; do
                kmi_version=$(basename "$dir" | sed 's/-lkm$//')
                filename=$(basename "$ko_file")
                if [[ "$filename" != "${kmi_version}_"* ]]; then
                  new_name="${kmi_version}_${filename}"
                  echo "Renaming: $ko_file -> $(dirname "$ko_file")/$new_name"
                  mv "$ko_file" "$(dirname "$ko_file")/$new_name"
                fi
              done
            fi
          done

      - name: Zip AnyKernel3
        run: |
          for dir in AnyKernel3-*; do
            if [ -d "$dir" ]; then
              echo "----- Zip $dir -----"
              (cd "$dir" && zip -r9 "$dir".zip ./* -x .git .gitignore ./*.zip && mv *.zip ..) 2>/dev/null || true
            fi
          done

      - name: Zip WSA kernel
        run: |
          for dir in kernel-WSA-*; do
            if [ -d "$dir" ]; then
              echo "------ Zip $dir ----------"
              (cd "$dir" && zip -r9 "$dir".zip ./* -x .git .gitignore ./*.zip && mv *.zip ..) 2>/dev/null || true
            fi
          done

      - name: Zip ChromeOS ARCVM kernel
        run: |
          for dir in kernel-ARCVM-*; do
            if [ -d "$dir" ]; then
              echo "------ Zip $dir ----------"
              (cd "$dir" && zip -r9 "$dir".zip ./* -x .git .gitignore ./*.zip && mv *.zip ..) 2>/dev/null || true
            fi
          done

      - name: Display structure of downloaded files
        run: ls -R

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_title || github.ref_name }}
          files: |
            manager/*.apk
            android*-lkm/*.ko
            AnyKernel3-*.zip
            boot-images-*/Image-*/*.img.gz
            kernel-WSA*.zip
            kernel-ARCVM*.zip
            ksud/ksud-*
          fail_on_unmatched_files: false
          generate_release_notes: true